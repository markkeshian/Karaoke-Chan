name: karaoke_chan
description: A cross-platform karaoke queue app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Media playback
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5

  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # File picking
  file_picker: ^8.0.3

  # Runtime permissions (Android)
  permission_handler: ^11.3.1

  # Persistence
  shared_preferences: ^2.3.3

  # UI extras
  google_fonts: ^6.2.1
  gap: ^3.0.1

  # YouTube search & streaming
  youtube_explode_dart: ^2.3.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.7

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/applogo.png"
  min_sdk_android: 21

msix_config:
  display_name: Karaoke-Chan
  publisher_display_name: markkeshian
  identity_name: markkeshian.Karaoke-Chan
  msix_version: 1.0.0.0
  description: A cross-platform karaoke queue app
  publisher: CN=015A585B-04FF-4CDD-B665-24520B3CD11F
  logo_path: assets/icons/applogo.png
  capabilities: internetClient, privateNetworkClientServer
  languages: en-us

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
  # Nunito is loaded at runtime via the google_fonts package — no local .ttf needed.
