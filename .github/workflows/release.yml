name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk karaoke-chan-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: karaoke-chan-android.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Ninja and Visual Studio Build Tools
        run: choco install ninja -y

      - name: Set up Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Build Windows
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          flutter build windows --release

      - name: Build MSIX
        run: dart run msix:create

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/karaoke_chan.msix

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd macos && pod install

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS build
        run: zip -r karaoke-chan-macos.zip "build/macos/Build/Products/Release/Karaoke-Chan.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: karaoke-chan-macos.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Karaoke Chan ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            - See commit history for changes.

            ## Installation

            ### 🤖 Android
            1. Download `karaoke-chan-android.apk`
            2. Enable **Install from unknown sources** in Settings
            3. Open the APK and tap **Install**

            ### 🪟 Windows
            1. Download `karaoke_chan.msix`
            2. Double-click to install (no extraction needed!)
            3. Launch **Karaoke Chan** from the Start Menu

            ### 🍎 macOS
            1. Download `karaoke-chan-macos.zip`
            2. Extract and move `karaoke_chan.app` to your Applications folder
            3. Right-click → **Open** (first time only, to bypass Gatekeeper)
          files: |
            android-apk/karaoke-chan-android.apk
            windows-build/karaoke_chan.msix
            macos-build/karaoke-chan-macos.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
